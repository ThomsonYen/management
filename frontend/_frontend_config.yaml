# Frontend configuration

# How many seconds a todo fades before it is marked as done.
# During this window the user can uncheck to cancel.
todo_done_fade_seconds: 2

# How many seconds before an unfocused todo is actually removed from Focus.
# During this window the user can click again to cancel.
unfocus_fade_seconds: 3

# Default max height (px) for each day's content box on the Goals page.
# Content that exceeds this height becomes scrollable.
goal_day_box_height_px: 400
